<style>
  :root{
    --onyx:#080808;
    --alabaster:#F7F4ED;
    --alabaster-2:#EFEBE0;
    --line:rgba(8,8,8,0.10);
    --muted:rgba(8,8,8,0.55);
    --display:"Le Petrichor", Georgia, serif;
    --body:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--alabaster);
    color:var(--onyx);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:clamp(20px,4vw,56px);
  }

  .stage{width:100%;max-width:980px;}

  /* Header */
  .brand{
    display:flex;align-items:baseline;justify-content:space-between;
    flex-wrap:wrap;gap:8px;
    border-bottom:1px solid var(--line);
    padding-bottom:18px;margin-bottom:clamp(28px,5vw,52px);
  }
  .brand h1{
    font-family:var(--display);
    font-weight:600;
    font-size:clamp(26px,5vw,46px);
    letter-spacing:0.01em;
    line-height:1;
  }
  .brand .live{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:600;letter-spacing:0.18em;
    text-transform:uppercase;color:var(--muted);
  }
  .dot{
    width:8px;height:8px;border-radius:50%;background:var(--onyx);
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.8);}}

  /* Total */
  .total-label{
    font-size:clamp(11px,1.4vw,13px);font-weight:600;
    letter-spacing:0.26em;text-transform:uppercase;color:var(--muted);
    text-align:center;margin-bottom:6px;
  }
  .total{
    font-family:var(--display);font-weight:700;
    font-size:clamp(86px,22vw,210px);line-height:.92;
    text-align:center;letter-spacing:-0.02em;
    font-variant-numeric:tabular-nums;
  }

  /* Metric trio */
  .metrics{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:clamp(10px,2vw,24px);
    margin-top:clamp(34px,6vw,64px);
  }
  .metric{
    background:var(--alabaster-2);
    border:1px solid var(--line);
    border-radius:16px;
    padding:clamp(18px,3vw,30px) clamp(12px,2vw,22px);
    text-align:center;
  }
  .metric .num{
    font-family:var(--display);font-weight:600;
    font-size:clamp(40px,8vw,76px);line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .metric .cap{
    margin-top:12px;font-size:clamp(11px,1.5vw,14px);
    font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--muted);
  }

  /* Action buttons */
  .actions{
    display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
    margin-top:clamp(28px,5vw,46px);
  }
  .btn{
    font-family:var(--body);font-size:14px;font-weight:600;letter-spacing:0.04em;
    padding:13px 28px;border-radius:999px;cursor:pointer;
    border:1px solid var(--onyx);text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;
    transition:opacity .18s ease, background .18s ease, color .18s ease;
  }
  .btn-primary{background:var(--onyx);color:var(--alabaster);}
  .btn-primary:hover{opacity:.82;}
  .btn-ghost{background:transparent;color:var(--onyx);}
  .btn-ghost:hover{background:var(--onyx);color:var(--alabaster);}

  /* Footer */
  .foot{
    margin-top:clamp(30px,5vw,52px);
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:8px;
    font-size:13px;color:var(--muted);
  }
  .foot .status{display:inline-flex;align-items:center;gap:8px;}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
  .status-dot.ok{background:#2e7d32;}
  .status-dot.warn{background:#b07400;}

  @media(max-width:560px){
    .metrics{grid-template-columns:1fr;}
    .brand{justify-content:center;text-align:center;}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="brand">
      <h1>AiRCHAiR&nbsp;Virtual&nbsp;Cohort</h1>
      <span class="live"><span class="dot"></span>Live</span>
    </div>

    <div class="total-label">Total Moves This Cohort</div>
    <div class="total" id="total">0</div>

    <div class="metrics">
      <div class="metric"><div class="num" id="m-projects">0</div><div class="cap">New Projects</div></div>
      <div class="metric"><div class="num" id="m-skills">0</div><div class="cap">Skills Created</div></div>
      <div class="metric"><div class="num" id="m-tools">0</div><div class="cap">Tools Practiced</div></div>
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="https://docs.google.com/spreadsheets/d/1_rBZkpKDVNKT6DOnHXdB9Jr42A4hOddMCbdxJMaLnUo/edit" target="_blank" rel="noopener">Log Your Moves</a>
      <button class="btn btn-ghost" id="refresh" type="button">Refresh</button>
    </div>

    <div class="foot">
      <span id="participants">8 participants logging</span>
      <span class="status"><span class="status-dot" id="sdot"></span><span id="status">Connecting…</span></span>
    </div>
  </div>

<script>
(function(){
  var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyFWEOX-N49M19BiQkwk_VXnDD0rb2Q0aImgLVd--ghOdTpjNrEX8TeYQw-NiN7rFvrTBJJxejWbWT/pub?gid=85866931&single=true&output=csv";
  var $=function(id){return document.getElementById(id);};
  function pl(line){var o=[],cur="",q=false;for(var i=0;i<line.length;i++){var ch=line[i];if(ch===String.fromCharCode(34)){if(q&&line[i+1]===String.fromCharCode(34)){cur+=String.fromCharCode(34);i++;}else{q=!q;}}else if(ch===","&&!q){o.push(cur);cur="";}else{cur+=ch;}}o.push(cur);return o;}
  async function load(){
    try{
      var u=CSV_URL+(CSV_URL.indexOf("?")>-1?"&":"?")+"cb="+Date.now();
      var res=await fetch(u,{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      var csv=await res.text();
      var rows=csv.split(/\r?\n/).filter(function(r){return r.trim();}).map(pl);
      var data=rows.slice(1).filter(function(r){return (r[0]||"").trim();});
      var p=0,s=0,t=0;
      data.forEach(function(r){p+=parseFloat(r[1])||0;s+=parseFloat(r[2])||0;t+=parseFloat(r[3])||0;});
      $("m-projects").textContent=p;$("m-skills").textContent=s;$("m-tools").textContent=t;
      $("total").textContent=p+s+t;
      $("participants").textContent=data.length+" participants logging";
      var d=new Date(),h=d.getHours(),m=String(d.getMinutes()).padStart(2,"0"),ap=h>=12?"PM":"AM";h=h%12||12;
      $("status").textContent="Updated "+h+":"+m+" "+ap;
      var dot=$("sdot"); if(dot) dot.style.background="#2e7d32";
    }catch(e){
      $("status").textContent="Connecting"+String.fromCharCode(8230);
      var dot=$("sdot"); if(dot) dot.style.background="#bbb";
    }
  }
  var rb=$("refresh"); if(rb) rb.addEventListener("click",load);
  load(); setInterval(load,60000);
})();
</script>
<!-- cohort-fix-v2 -->
</body>
</html>
